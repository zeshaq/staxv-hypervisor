<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gSV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="fGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="b"/>
      <feFlood flood-color="#38bdf8" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="url(#gSV)" filter="url(#fGlow)">
    <polygon points="22,42 88,42 72,98 48,98"/>
    <polygon points="112,42 178,42 152,98 128,98"/>
    <polygon points="36,108 82,108 68,150 48,150"/>
    <polygon points="118,108 164,108 152,150 132,150"/>
    <polygon points="55,160 145,160 100,196"/>
  </g>
</svg>
